<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="deckBg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="48%" stop-color="#07111F"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <linearGradient id="deckStroke" x1="110" y1="64" x2="1090" y2="356">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.8"/>
      <stop offset="35%" stop-color="#00F5FF" stop-opacity="0.72"/>
      <stop offset="68%" stop-color="#A855F7" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#FF00E5" stop-opacity="0.78"/>
    </linearGradient>

    <linearGradient id="glass" x1="125" y1="88" x2="1075" y2="332">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="42%" stop-color="#0F172A" stop-opacity="0.56"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.78"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-120" y="-120" width="1440" height="660" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glassShadow" x="80" y="40" width="1040" height="340" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000000" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00F5FF" flood-opacity="0.2"/>
    </filter>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#93C5FD" stroke-opacity="0.1" stroke-width="1"/>
    </pattern>

    <style>
      .mono { font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace; }
      .title { font-size: 30px; font-weight: 800; letter-spacing: 2px; }
      .label { font-size: 17px; font-weight: 800; letter-spacing: 1px; }
      .copy { font-size: 13px; font-weight: 600; letter-spacing: .5px; }
      @keyframes floatA {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: .45; }
        50% { opacity: .9; }
      }
      @keyframes sweep {
        0% { transform: translateX(-320px) skewX(-18deg); opacity: 0; }
        20% { opacity: .45; }
        70% { opacity: .2; }
        100% { transform: translateX(1140px) skewX(-18deg); opacity: 0; }
      }
      .floatA { animation: floatA 5.2s ease-in-out infinite; }
      .floatB { animation: floatA 6.1s ease-in-out infinite reverse; }
      .pulse { animation: pulse 2.7s ease-in-out infinite; }
      .sweep { animation: sweep 5.5s ease-in-out infinite; transform-origin: center; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#deckBg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <g filter="url(#softGlow)" opacity="0.62">
    <circle class="floatA" cx="165" cy="110" r="58" fill="#00F5FF" fill-opacity="0.2"/>
    <circle class="floatB" cx="1015" cy="92" r="72" fill="#FF00E5" fill-opacity="0.18"/>
    <circle class="floatA" cx="980" cy="330" r="48" fill="#00FFB2" fill-opacity="0.16"/>
    <circle class="floatB" cx="250" cy="334" r="44" fill="#A855F7" fill-opacity="0.2"/>
  </g>

  <rect x="95" y="52" width="1010" height="316" rx="30" fill="url(#glass)" stroke="url(#deckStroke)" stroke-width="2" filter="url(#glassShadow)"/>
  <rect x="119" y="76" width="962" height="68" rx="22" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <rect x="132" y="87" width="360" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.48"/>
  <rect class="sweep" x="-260" y="58" width="190" height="304" fill="url(#shine)" opacity="0.36"/>

  <text x="600" y="104" text-anchor="middle" fill="#E0F2FE" class="mono title">GLASS CONTROL DECK</text>
  <text x="600" y="128" text-anchor="middle" fill="#67E8F9" class="mono copy">FULL-STACK ENGINEERING | BACKEND SYSTEMS | 3D MOTION DESIGN</text>

  <g transform="translate(135 178)">
    <rect width="214" height="124" rx="22" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.2"/>
    <rect x="14" y="14" width="46" height="46" rx="16" fill="#00F5FF" fill-opacity="0.16" stroke="#00F5FF" stroke-opacity="0.58"/>
    <path d="M29 29L20 38L29 47" stroke="#7DF9FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M45 29L54 38L45 47" stroke="#7DF9FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="22" y="82" fill="#E0F2FE" class="mono label">WEB SYSTEMS</text>
    <text x="22" y="105" fill="#93C5FD" class="mono copy">React, TypeScript, Vercel</text>
  </g>

  <g transform="translate(375 178)">
    <rect width="214" height="124" rx="22" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.2"/>
    <rect x="14" y="14" width="46" height="46" rx="16" fill="#00FFB2" fill-opacity="0.14" stroke="#00FFB2" stroke-opacity="0.56"/>
    <path d="M37 25C50 25 57 30 57 36C57 42 50 47 37 47C24 47 17 42 17 36C17 30 24 25 37 25Z" stroke="#86EFAC" stroke-width="3"/>
    <path d="M17 36V50C17 56 24 61 37 61C50 61 57 56 57 50V36" stroke="#86EFAC" stroke-width="3"/>
    <text x="22" y="82" fill="#E0F2FE" class="mono label">BACKEND API</text>
    <text x="22" y="105" fill="#93C5FD" class="mono copy">Spring Boot, REST, SQL</text>
  </g>

  <g transform="translate(615 178)">
    <rect width="214" height="124" rx="22" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.2"/>
    <rect x="14" y="14" width="46" height="46" rx="16" fill="#A855F7" fill-opacity="0.16" stroke="#A855F7" stroke-opacity="0.62"/>
    <path d="M37 20L56 31V53L37 64L18 53V31L37 20Z" stroke="#C4B5FD" stroke-width="3" stroke-linejoin="round"/>
    <path d="M18 31L37 42L56 31" stroke="#C4B5FD" stroke-width="3" stroke-linejoin="round"/>
    <path d="M37 42V64" stroke="#C4B5FD" stroke-width="3"/>
    <text x="22" y="82" fill="#E0F2FE" class="mono label">3D MOTION</text>
    <text x="22" y="105" fill="#93C5FD" class="mono copy">Blender, AE, visuals</text>
  </g>

  <g transform="translate(855 178)">
    <rect width="214" height="124" rx="22" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.2"/>
    <rect x="14" y="14" width="46" height="46" rx="16" fill="#FF00E5" fill-opacity="0.14" stroke="#FF00E5" stroke-opacity="0.62"/>
    <path d="M24 48L34 58L54 28" stroke="#F0ABFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle class="pulse" cx="58" cy="20" r="5" fill="#FF00E5"/>
    <text x="22" y="82" fill="#E0F2FE" class="mono label">SHIP READY</text>
    <text x="22" y="105" fill="#93C5FD" class="mono copy">Testing, docs, release</text>
  </g>

  <path d="M125 338H1075" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="600" y="350" text-anchor="middle" fill="#BAE6FD" class="mono copy">Clean code surfaces, frosted interface energy, and creative engineering in one profile.</text>
</svg>
